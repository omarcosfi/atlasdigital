<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mapa do Campus — Estácio FMJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#3DB8AA;--teal-dk:#2A9688;--teal-lt:#E8F7F5;--teal-mid:#6ECEC4;
  --blue:#2980C4;--blue-dk:#1A5F9A;
  --blk-color:#1C3A5E;       /* single block color */
  --blk-hover:#254875;
  --c-park:#004AAD;           /* parking blue — from SVG */
  --c-path:#FFDE59;           /* walking path yellow — from SVG */
  --c-leisure:#00BF63;        /* leisure green — from SVG */
  --c-canteen:#FF751F;        /* canteen orange — from SVG */
  --c-entrance:#CB6CE6;       /* entrance purple — from SVG */
  --white:#FFFFFF;--bg:#F4F3EF;--bdr:#DDD9D2;
  --gy:#6B7280;--gy-md:#9CA3AF;--navy:#1C2B4A;
  --r:12px;--r-sm:8px;--r-xs:5px;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden}
@media(max-width:720px){html,body{overflow:auto}}

/* ── TOP BAR ── */
.bar{
  position:fixed;inset:0 0 auto 0;height:58px;
  background:linear-gradient(135deg,#2A9688 0%,#3DB8AA 52%,#2980C4 100%);
  display:flex;align-items:center;gap:12px;padding:0 14px;
  z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2)
}
.bar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.bar-em{width:36px;height:36px;flex-shrink:0}
.bar-tt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;line-height:1.2;white-space:nowrap}
.bar-st{font-size:9.5px;color:rgba(255,255,255,.62);font-weight:300}
.bar-sw{flex:1;max-width:320px;position:relative;margin-left:auto}
.bar-si{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.26);border-radius:var(--r-sm);padding:7px 11px;transition:background .15s}
.bar-si:focus-within{background:rgba(255,255,255,.24)}
.bar-si i{color:rgba(255,255,255,.65);font-size:14px;flex-shrink:0}
.bar-si input{border:none;background:transparent;font-size:12px;color:#fff;outline:none;width:100%;font-family:'DM Sans',sans-serif}
.bar-si input::placeholder{color:rgba(255,255,255,.48)}
.sdrop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;overflow:hidden;display:none}
.sdrop.show{display:block}
.sd-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:.5px solid var(--bdr);transition:background .12s}
.sd-item:last-child{border-bottom:none}
.sd-item:hover{background:var(--teal-lt)}
.sd-badge{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:10px;color:#fff;background:var(--blk-color);flex-shrink:0}
.sd-name{font-size:12px;font-weight:500;color:var(--navy);flex:1}
.sd-sub{font-size:10px;color:var(--gy)}
.sd-tag{font-size:9px;padding:1px 6px;border-radius:8px;border:.5px solid;flex-shrink:0}
.bar-mbtn{display:none;width:36px;height:36px;border:1px solid rgba(255,255,255,.24);border-radius:var(--r-sm);background:transparent;cursor:pointer;color:#fff;font-size:18px;align-items:center;justify-content:center;flex-shrink:0}
@media(max-width:720px){.bar-mbtn{display:flex}.bar-sw{max-width:unset;flex:1}}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;padding-top:58px}
@media(max-width:720px){.layout{flex-direction:column;height:auto}}

/* ── SIDEBAR ── */
.side{width:282px;min-width:282px;background:var(--white);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:calc(100vh - 58px);overflow:hidden}
@media(max-width:720px){
  .side{position:fixed;top:58px;left:0;bottom:0;width:86vw;max-width:296px;z-index:180;transform:translateX(-108%);transition:transform .24s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.14)}
  .side.open{transform:translateX(0)}
}
.back{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:170}
@media(max-width:720px){.back.show{display:block}}
.fstrip{padding:10px 12px;border-bottom:1px solid var(--bdr)}
.flbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--gy);margin-bottom:7px}
.frow{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.frow::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:3px;font-size:10px;padding:4px 9px;border-radius:20px;border:1px solid var(--bdr);background:var(--white);color:var(--gy);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .13s;flex-shrink:0}
.chip i{font-size:11px}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip.on-dk{background:var(--blk-color);color:#fff;border-color:var(--blk-color)}
.blist{flex:1;overflow-y:auto;padding:7px 9px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
.blist::-webkit-scrollbar{width:3px}
.blist::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.brow{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:var(--r-sm);cursor:pointer;border:1px solid transparent;transition:all .13s;margin-bottom:2px}
.brow:hover{background:var(--bg);border-color:var(--bdr)}
.brow.sel{background:var(--teal-lt);border-color:var(--teal-mid)}
.brow-badge{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#fff;background:var(--blk-color);flex-shrink:0}
.brow-info{flex:1;min-width:0}
.brow-name{font-size:12px;font-weight:500;color:var(--navy)}
.brow-ct{font-size:10px;color:var(--gy)}
.brow-arr{font-size:12px;color:var(--gy-md)}
.side-nores{padding:20px;text-align:center;font-size:12px;color:var(--gy);font-style:italic}

/* ── MAP ── */
.mapwrap{flex:1;position:relative;overflow:hidden;background:#7A9E3A;cursor:grab}
.mapwrap:active{cursor:grabbing}
@media(max-width:720px){.mapwrap{height:56vh;min-height:290px;flex:none}}
.map-inner{position:absolute;inset:0;transform-origin:0 0;will-change:transform}

/* ── BLOCK BUTTONS — no flex-direction, fixed size, label below ── */
.mb{
  position:absolute;
  cursor:pointer;
  z-index:10;
}
.mb-box{
  position:absolute;top:0;left:0;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;color:#fff;
  background:var(--blk-color);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  transition:transform .16s,box-shadow .16s,opacity .16s;
}
.mb:hover .mb-box{transform:translateY(-2px) scale(1.04);box-shadow:0 5px 16px rgba(0,0,0,.3)}
.mb.sel .mb-box{transform:translateY(-3px) scale(1.05);box-shadow:0 0 0 3px #fff,0 5px 18px rgba(0,0,0,.32)}
.mb.dim .mb-box{opacity:.2}
.mb-lbl{
  position:absolute;
  left:50%;transform:translateX(-50%);
  white-space:nowrap;
  font-size:8px;font-weight:500;
  color:var(--navy);
  background:rgba(255,255,255,.92);
  padding:2px 5px;border-radius:4px;
  box-shadow:0 1px 4px rgba(0,0,0,.12);
  pointer-events:none;
  line-height:1.3;
  max-width:88px;text-align:center;
}

/* ── MAP OVERLAY ELEMENTS (paths, leisure, parking, canteens) ── */
.map-svg{position:absolute;inset:0;width:100%;height:100%}

/* pins */
.mpin{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:8;cursor:default;transform:translate(-50%,-50%)}
.mpin-c{width:20px;height:20px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(0,0,0,.24)}
.mpin-c i{font-size:9px;color:#fff}
.mpin-lbl{font-size:7.5px;color:var(--navy);background:rgba(255,255,255,.92);padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.1);pointer-events:none}

/* legend */
.legend{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.93);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:9px 12px;z-index:8;backdrop-filter:blur(6px)}
@media(max-width:720px){.legend{display:none}}
.leg-h{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gy);margin-bottom:6px}
.leg-i{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--navy);margin-bottom:3px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* zoom */
.zbw{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:8}
.zb{width:30px;height:30px;background:rgba(255,255,255,.9);border:1px solid var(--bdr);border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--navy);backdrop-filter:blur(4px);transition:background .13s}
.zb:hover{background:#fff}

/* ── DETAIL PANEL ── */
.detail{
  position:absolute;top:0;right:0;bottom:0;width:296px;
  background:var(--white);border-left:1px solid var(--bdr);
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  z-index:50;display:flex;flex-direction:column;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--bdr) transparent
}
.detail.open{transform:translateX(0)}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
@media(max-width:720px){
  .detail{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;
    height:72vh;border-left:none;border-top:1px solid var(--bdr);
    border-radius:18px 18px 0 0;transform:translateY(104%);
    box-shadow:0 -8px 32px rgba(0,0,0,.12)}
  .detail.open{transform:translateY(0)}
}
.drag-h{display:none;width:38px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 0;flex-shrink:0}
@media(max-width:720px){.drag-h{display:block}}
.det-hd{padding:14px 16px 12px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--white);z-index:2}
.det-cls{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gy)}
.det-cls:hover{background:var(--bdr)}
.det-em{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;background:var(--blk-color);margin-bottom:8px}
.det-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--navy)}
.det-sub{font-size:11px;color:var(--gy);margin-top:2px}
.mini-map{margin:10px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);overflow:hidden;background:#DFF0C0}
.mini-map svg{width:100%;display:block}
.det-body{padding:8px 14px 24px}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--gy);margin:12px 0 6px}
.rcard{background:var(--bg);border-radius:var(--r-sm);padding:9px 11px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:all .14s}
.rcard:hover{background:var(--teal-lt);border-color:var(--teal-mid)}
.rcard.open{background:var(--teal-lt);border-color:var(--teal)}
.rc-top{display:flex;align-items:center;gap:8px}
.rc-ico{font-size:14px;flex-shrink:0;color:var(--teal-dk)}
.rc-name{font-size:12px;font-weight:500;color:var(--navy);flex:1;line-height:1.3}
.rc-arr{font-size:11px;color:var(--gy-md);transition:transform .18s;flex-shrink:0}
.rcard.open .rc-arr{transform:rotate(90deg)}
.rc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;border:.5px solid;display:inline-block}
.rcard-detail{display:none;margin-top:8px;background:var(--white);border:1px solid var(--bdr);border-radius:var(--r-sm);overflow:hidden}
.rcard.open .rcard-detail{display:block}
.rcd-row{display:flex;align-items:flex-start;gap:9px;padding:7px 10px;border-bottom:.5px solid var(--bdr);font-size:11px}
.rcd-row:last-child{border-bottom:none}
.rcd-row i{font-size:13px;color:var(--gy);flex-shrink:0;margin-top:1px}
.rcd-lbl{color:var(--gy);min-width:64px;flex-shrink:0}
.rcd-val{color:var(--navy)}
.no-res{padding:16px;text-align:center;font-size:12px;color:var(--gy);font-style:italic}
.tag-sala{background:#EEF2FA;color:#2E4070;border-color:#B0BEEF}
.tag-lab{background:#E6F4EC;color:#1A6B3A;border-color:#7DCCA0}
.tag-admin{background:#FFF8E6;color:#5A4000;border-color:#F0C96A}
.tag-wc{background:#F0EEF9;color:#5A3DB5;border-color:#B9ABE8}
.tag-saude{background:#FDECEA;color:#A81820;border-color:#F09595}
.tag-social{background:#FFF3E0;color:#7A4F00;border-color:#F0C06A}
.tag-biblioteca{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.tag-informatica{background:#E8F7F5;color:#2A9688;border-color:#7DCEC8}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,184,170,.5)}70%{box-shadow:0 0 0 10px rgba(61,184,170,0)}100%{box-shadow:0 0 0 0 rgba(61,184,170,0)}}
.mb.sel .mb-box{animation:pulse 1.6s ease-out}
</style>
</head>
<body>

<header class="bar">
  <a class="bar-logo" href="#">
    <div class="bar-em">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5DDDD0"/>
            <stop offset="50%" stop-color="#3BB8AA"/>
            <stop offset="100%" stop-color="#2278C0"/>
          </linearGradient>
          <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,.3)"/>
          </filter>
        </defs>
        <!-- Diamond -->
        <path d="M18 1 L35 18 L18 35 L1 18 Z" fill="url(#dg)" filter="url(#ds)"/>
        <!-- Facet lines -->
        <line x1="1" y1="18" x2="35" y2="18" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
        <line x1="18" y1="1" x2="18" y2="35" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
        <line x1="1" y1="18" x2="18" y2="1" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <line x1="35" y1="18" x2="18" y2="1" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <line x1="1" y1="18" x2="18" y2="35" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <line x1="35" y1="18" x2="18" y2="35" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <!-- Highlight top facet -->
        <path d="M18 1 L35 18 L18 18 L1 18 Z" fill="rgba(255,255,255,.09)"/>
      </svg>
    </div>
    <div class="bar-tt">Estácio FMJ<div class="bar-st">Mapa do Campus</div></div>
  </a>
  <div class="bar-sw">
    <div class="bar-si">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar bloco, sala, laboratório…" autocomplete="off">
    </div>
    <div class="sdrop" id="searchDrop"></div>
  </div>
  <button class="bar-mbtn" id="menuBtn" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
</header>

<div class="back" id="backdrop"></div>

<div class="layout">
  <aside class="side" id="sidebar">
    <div class="fstrip">
      <div class="flbl">Filtrar por tipo</div>
      <div class="frow" id="filtersRow">
        <div class="chip on-dk" data-f="all"><i class="ti ti-layout-grid"></i>Todos</div>
        <div class="chip" data-f="sala"><i class="ti ti-school"></i>Salas</div>
        <div class="chip" data-f="lab"><i class="ti ti-microscope"></i>Labs</div>
        <div class="chip" data-f="informatica"><i class="ti ti-device-laptop"></i>Info.</div>
        <div class="chip" data-f="admin"><i class="ti ti-briefcase"></i>Admin</div>
        <div class="chip" data-f="wc"><i class="ti ti-accessible"></i>Banheiros</div>
        <div class="chip" data-f="biblioteca"><i class="ti ti-books"></i>Biblioteca</div>
        <div class="chip" data-f="saude"><i class="ti ti-first-aid-kit"></i>Saúde</div>
        <div class="chip" data-f="social"><i class="ti ti-coffee"></i>Social</div>
      </div>
    </div>
    <div class="blist" id="blocksList"></div>
  </aside>

  <main class="mapwrap" id="mapWrap">
    <div class="map-inner" id="mapInner">

      <!--
        SVG base map — coordinates match real uploaded SVG (viewBox 793.5 x 690.75)
        Colors from original:
          #000000 = roads (black)
          #004AAD = parking/internal roads (dark blue)
          #FFDE59 = walking paths (yellow)
          #00BF63 = leisure areas (green)
          #FF751F = canteens (orange)
          #CB6CE6 = entrance (purple)
          #B4AEAE = blocks (gray — replaced by our navy blue)
      -->
      <svg id="baseSvg" viewBox="0 0 793.5 690.75" xmlns="http://www.w3.org/2000/svg"
           style="position:absolute;inset:0;width:100%;height:100%" preserveAspectRatio="xMidYMid slice">

        <!-- Ground -->
        <rect width="793.5" height="690.75" fill="#7A9E3A"/>

        <!-- ── ROADS (black) ── -->
        <!-- Bottom-left road -->
        <rect x="3" y="59" width="380" height="66" rx="2" fill="#2A2A2A"/>
        <!-- Bottom road continuation -->
        <rect x="17" y="624" width="380" height="50" rx="2" fill="#2A2A2A"/>
        <!-- Bottom right road -->
        <rect x="411" y="610" width="365" height="52" rx="2" fill="#2A2A2A"/>
        <!-- Road junction -->
        <rect x="390" y="636" width="26" height="51" rx="1" fill="#2A2A2A"/>

        <!-- Road name labels -->
        <text x="30" y="95" font-size="9" fill="rgba(255,255,255,.7)" font-family="DM Sans,sans-serif">Av. Padre Cícero</text>
        <text x="430" y="635" font-size="9" fill="rgba(255,255,255,.7)" font-family="DM Sans,sans-serif">Av. Leão Sampaio</text>
        <text x="30" y="650" font-size="9" fill="rgba(255,255,255,.7)" font-family="DM Sans,sans-serif">Rua João Pessoa</text>

        <!-- ── PARKING / INTERNAL ROADS (dark blue #004AAD) ── -->
        <!-- Vertical spine road through campus -->
        <rect x="387" y="80" width="24" height="556" rx="2" fill="#004AAD" opacity=".85"/>
        <!-- Top horizontal access -->
        <rect x="411" y="80" width="36" height="17" rx="1" fill="#004AAD" opacity=".85"/>
        <!-- Parking slots top right (two columns) -->
        <rect x="444" y="80" width="25" height="128" rx="2" fill="#004AAD" opacity=".75"/>
        <rect x="478" y="80" width="25" height="128" rx="2" fill="#004AAD" opacity=".75"/>
        <!-- gap connectors -->
        <rect x="469" y="80" width="9" height="29" rx="1" fill="#004AAD" opacity=".6"/>
        <rect x="469" y="179" width="9" height="29" rx="1" fill="#004AAD" opacity=".6"/>
        <!-- Main left parking lot -->
        <rect x="37" y="366" width="150" height="208" rx="3" fill="#004AAD" opacity=".65"/>
        <!-- Parking grid lines -->
        <g stroke="#003A8C" stroke-width=".8" opacity=".4">
          <line x1="60" y1="366" x2="60" y2="574"/><line x1="80" y1="366" x2="80" y2="574"/>
          <line x1="100" y1="366" x2="100" y2="574"/><line x1="120" y1="366" x2="120" y2="574"/>
          <line x1="140" y1="366" x2="140" y2="574"/><line x1="160" y1="366" x2="160" y2="574"/>
          <line x1="37" y1="406" x2="187" y2="406"/><line x1="37" y1="446" x2="187" y2="446"/>
          <line x1="37" y1="486" x2="187" y2="486"/><line x1="37" y1="526" x2="187" y2="526"/>

function tClass(t){return `tag tag-${t}`;}

/* ── SEARCH DROPDOWN ── */
function buildDrop(q){
  const dr=document.getElementById("searchDrop");
  if(!q){dr.classList.remove("show");dr.innerHTML="";return;}
  const hits=[];

    if(b.name.toLowerCase().includes(q.toLowerCase())||b.desc.toLowerCase().includes(q.toLowerCase()))
      hits.unshift({k,b,r:null});
    b.rooms.forEach(r=>{if(r.name.toLowerCase().includes(q.toLowerCase()))hits.push({k,b,r});});
  });
  const top=[...new Map(hits.map(h=>[h.k+(h.r?h.r.id:""),h])).values()].slice(0,3);
  if(!top.length){dr.classList.remove("show");return;}
  dr.innerHTML=top.map(h=>`<div class="sd-item" data-bk="${h.k}" data-rid="${h.r?h.r.id:""}">
    <div class="sd-badge">${h.k}</div>
    <div style="flex:1;min-width:0"><div class="sd-name">${h.r?h.r.name:h.b.name}</div><div class="sd-sub">${h.b.name}</div></div>
    <span class="sd-tag ${tClass(h.r?h.r.tags[0]:"admin")}">${tLbl(h.r?h.r.tags[0]:"admin")}</span>
  </div>`).join("");
  dr.classList.add("show");
  dr.querySelectorAll(".sd-item").forEach(el=>{
    el.addEventListener("click",()=>{
      openBlock(el.dataset.bk);
      if(el.dataset.rid)setTimeout(()=>openRoomById(el.dataset.rid),220);
      dr.classList.remove("show");
      document.getElementById("searchInput").value="";
      searchQ="";closeMobile();
    });
  });
}
function openRoomById(rid){const c=document.getElementById("rc-"+rid);if(c){c.click();c.scrollIntoView({behavior:"smooth",block:"nearest"});}}

/* ── SIDEBAR ── */
function renderList(){
  const el=document.getElementById("blocksList");
  el.innerHTML="";
  Object.entries(BLOCKS).forEach(([k,b])=>{
    const vis=b.rooms.filter(rVis);
    if((aFilter!=="all"||searchQ)&&vis.length===0)return;
    const d=document.createElement("div");
    d.className="brow"+(selBlock===k?" sel":"");
    d.innerHTML=`<div class="brow-badge">${k}</div>
      <div class="brow-info"><div class="brow-name">${b.name}</div><div class="brow-ct">${vis.length} ambiente${vis.length!==1?"s":""}</div></div>
      <i class="ti ti-chevron-right brow-arr"></i>`;
    d.addEventListener("click",()=>{openBlock(k);closeMobile();});
    el.appendChild(d);
  });
  if(!el.children.length)el.innerHTML=`<div class="side-nores">Nenhum resultado.</div>`;
}

/* ── MAP ── */
function renderMap(){
  const c=document.getElementById("mapBlocks");
  c.innerHTML="";
  const mw=document.getElementById("mapWrap");
  const dpW=selBlock&&window.innerWidth>720?296:0;
  const sw=Math.max(mw.clientWidth-dpW,200);
  const sh=Math.max(mw.clientHeight,200);
  const sx=sw/VW, sy=sh/VH;

  Object.entries(BLOCKS).forEach(([k,b])=>{
    const hasMatch=b.rooms.some(rVis);
    const dim=(aFilter!=="all"||searchQ)&&!hasMatch;
    const bw=Math.round(b.svgW*sx);
    const bh=Math.round(b.svgH*sy);
    const fs=Math.max(8,Math.min(13,12*Math.min(sx,sy)));
    const div=document.createElement("div");
    div.className="mb"+(selBlock===k?" sel":"")+(dim?" dim":"");
    // size the outer div so it doesn't stretch — label uses absolute positioning
    div.style.cssText=`left:${Math.round(b.svgX*sx)}px;top:${Math.round(b.svgY*sy)}px;width:${bw}px;height:${bh}px;pointer-events:all`;
    div.innerHTML=
      `<div class="mb-box" style="width:${bw}px;height:${bh}px;font-size:${fs}px">${k}</div>`+
      `<div class="mb-lbl" style="top:${bh+3}px">${b.name}</div>`;
    div.addEventListener("click",()=>openBlock(k));
    c.appendChild(div);
  });
}

/* ── MINI MAP ── */
function renderMini(k){
  const b=BLOCKS[k];
  const el=document.getElementById("miniMapArea");
  if(!b.mini||!b.mini.length){el.innerHTML="";return;}
  const mh=Math.max(...b.mini.map(r=>r.y+r.h))+14;
  const rs=b.mini.map(r=>`
    <rect x="${r.x}%" y="${r.y+4}" width="${r.w}%" height="${r.h-2}" rx="3" fill="${r.c}" opacity=".86"/>
    <text x="${r.x+r.w/2}%" y="${r.y+4+r.h/2+3.5}" text-anchor="middle" font-size="7.5" fill="#fff" font-family="DM Sans,sans-serif">${r.l}</text>
  `).join("");
  el.innerHTML=`<div class="mini-map"><svg viewBox="0 0 100 ${mh}" style="height:${Math.min(mh*2,170)}px;width:100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <rect width="100" height="${mh}" fill="#DFF0C0"/>
    ${rs}
    <text x="50" y="${mh-2}" text-anchor="middle" font-size="6.5" fill="#6B7280" font-family="DM Sans,sans-serif">${b.name} — planta esquemática</text>
  </svg></div>`;
}

/* ── OPEN BLOCK ── */
function openBlock(k){
  selBlock=k;openRoom=null;
  const b=BLOCKS[k];
  document.getElementById("detEm").textContent=k;
  document.getElementById("detTitle").textContent=b.name;
  const vis=b.rooms.filter(rVis);
  document.getElementById("detSub").textContent=b.desc+" · "+vis.length+" ambiente"+(vis.length!==1?"s":"");
  renderDetailBody(k,vis);renderMini(k);
  document.getElementById("detPanel").classList.add("open");
  renderList();renderMap();
}

/* ── DETAIL BODY ── */
function renderDetailBody(k,rooms){
  const el=document.getElementById("detBody");
  if(!rooms.length){el.innerHTML=`<div class="no-res">Nenhum ambiente para este filtro.</div>`;return;}
  const groups={};
  rooms.forEach(r=>{const pt=TAG_ORDER.find(t=>r.tags.includes(t))||"admin";(groups[pt]=groups[pt]||[]).push(r);});
  let html="";
  TAG_ORDER.forEach(t=>{
    if(!groups[t])return;
    html+=`<div class="sec-lbl">${tLbl(t)}</div>`;
    groups[t].forEach(r=>{
      const isOpen=openRoom===r.id;
      html+=`<div class="rcard${isOpen?" open":""}" id="rc-${r.id}">
        <div class="rc-top" onclick="toggleRoom('${k}','${r.id}')">
          <i class="ti ${r.ico} rc-ico"></i><span class="rc-name">${r.name}</span>
          <i class="ti ti-chevron-right rc-arr"></i>
        </div>
        <div class="rc-tags">${r.tags.map(tg=>`<span class="${tClass(tg)}">${tLbl(tg)}</span>`).join("")}</div>
        <div class="rcard-detail">
          <div class="rcd-row"><i class="ti ti-users"></i><span class="rcd-lbl">Quem usa</span><span class="rcd-val">${r.d.uso}</span></div>
          <div class="rcd-row"><i class="ti ti-wheelchair"></i><span class="rcd-lbl">Acesso</span><span class="rcd-val">${r.d.ac}</span></div>
          <div class="rcd-row"><i class="ti ti-clock"></i><span class="rcd-lbl">Horário</span><span class="rcd-val">${r.d.hr}</span></div>
          <div class="rcd-row"><i class="ti ti-maximize"></i><span class="rcd-lbl">Capacidade</span><span class="rcd-val">${r.d.cap}</span></div>
          ${r.d.obs?`<div class="rcd-row"><i class="ti ti-notes"></i><span class="rcd-lbl">Obs.</span><span class="rcd-val">${r.d.obs}</span></div>`:""}
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function toggleRoom(k,id){
  openRoom=openRoom===id?null:id;
  renderDetailBody(k,BLOCKS[k].rooms.filter(rVis));
  if(openRoom){const c=document.getElementById("rc-"+openRoom);if(c)c.scrollIntoView({behavior:"smooth",block:"nearest"});}
}

/* ── CLOSE DETAIL ── */
document.getElementById("detClose").addEventListener("click",()=>{
  document.getElementById("detPanel").classList.remove("open");
  selBlock=null;openRoom=null;renderList();renderMap();
});

/* ── FILTERS ── */
document.getElementById("filtersRow").addEventListener("click",e=>{
  const ch=e.target.closest("[data-f]");if(!ch)return;
  aFilter=ch.dataset.f;openRoom=null;
  document.querySelectorAll("[data-f]").forEach(c=>{c.className="chip"});
  ch.className="chip "+(aFilter==="all"?"on-dk":"on");
  if(selBlock)openBlock(selBlock);else{renderList();renderMap();}
});

/* ── SEARCH ── */
document.getElementById("searchInput").addEventListener("input",e=>{
  searchQ=e.target.value.trim();openRoom=null;
  buildDrop(searchQ);
  if(selBlock)openBlock(selBlock);else{renderList();renderMap();}
});
document.addEventListener("click",e=>{
  if(!e.target.closest(".bar-sw"))document.getElementById("searchDrop").classList.remove("show");
});

/* ── MOBILE ── */
function closeMobile(){document.getElementById("sidebar").classList.remove("open");document.getElementById("backdrop").classList.remove("show");}
document.getElementById("menuBtn").addEventListener("click",()=>{
  const s=document.getElementById("sidebar"),o=s.classList.toggle("open");
  document.getElementById("backdrop").classList.toggle("show",o);
});
document.getElementById("backdrop").addEventListener("click",closeMobile);

/* ── ZOOM / PAN ── */
const inner=document.getElementById("mapInner");
function applyT(){inner.style.transform=`translate(${px}px,${py}px) scale(${scale})`;}
document.getElementById("zIn").addEventListener("click",()=>{scale=Math.min(scale*1.3,5);applyT();});
document.getElementById("zOut").addEventListener("click",()=>{scale=Math.max(scale/1.3,.3);applyT();});
document.getElementById("zReset").addEventListener("click",()=>{scale=1;px=0;py=0;applyT();});
let md=false,ms={x:0,y:0},mp={x:0,y:0};
document.getElementById("mapWrap").addEventListener("mousedown",e=>{
  if(e.target.closest(".mb")||e.target.closest(".detail"))return;
  md=true;ms={x:e.clientX,y:e.clientY};mp={x:px,y:py};
});
document.addEventListener("mousemove",e=>{if(!md)return;px=mp.x+(e.clientX-ms.x);py=mp.y+(e.clientY-ms.y);applyT();});
document.addEventListener("mouseup",()=>{md=false;});
let ts=null,tp={x:0,y:0};
document.getElementById("mapWrap").addEventListener("touchstart",e=>{
  if(e.touches.length===1&&!e.target.closest(".mb")){ts=e.touches[0];tp={x:px,y:py};}
},{passive:true});
document.getElementById("mapWrap").addEventListener("touchmove",e=>{
  if(e.touches.length===1&&ts){px=tp.x+(e.touches[0].clientX-ts.clientX);py=tp.y+(e.touches[0].clientY-ts.clientY);applyT();}
},{passive:true});
new ResizeObserver(()=>renderMap()).observe(document.getElementById("mapWrap"));

renderList();renderMap();
</script>
</body>
</html>
